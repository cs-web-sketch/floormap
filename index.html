<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>フードコート・フロアマップ（拡大版）</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --accent-pink: #e91e63;
            --shop-bg: #ffffff;
            --text-dark: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Meiryo", sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden; /* スクロール防止 */
        }

        /* 縦に並べるレイアウト */
        .wrapper {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        header {
            flex: 0 0 auto;
            background: linear-gradient(90deg, #880e4f 0%, #ad1457 100%);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .title { font-size: 1.5rem; font-weight: bold; }

        /* マップを画面いっぱいに広げる */
        .map-container {
            flex: 1; /* 残りの画面領域をすべて使う */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #252545; /* マップの背景を少し明るくして見やすく */
            padding: 10px;
        }

        svg {
            width: 95%;   /* 横幅いっぱい */
            height: 90%;  /* 高さもほぼいっぱい */
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
        }

        /* パーツのスタイル */
        .shop-block { fill: var(--shop-bg); stroke: #999; stroke-width: 1; transition: 0.2s; }
        .shop-label { fill: var(--text-dark); font-size: 16px; font-weight: bold; }
        .shop-id { fill: var(--accent-pink); font-size: 20px; font-weight: bold; }
        .facility { fill: #747d8c; }
        .facility-text { fill: white; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="title">FLOOR GUIDE - 2F フードコート</div>
        <div style="font-size: 1.2rem;">現在地：中央広場</div>
    </header>

    <div class="map-container">
        <svg viewBox="40 40 720 420" preserveAspectRatio="xMidYMid meet">
            <rect x="50" y="50" width="700" height="400" rx="15" fill="#f8f9fa" />
            
            <rect x="250" y="150" width="300" height="200" rx="10" fill="#dee2e6" />
            <text x="400" y="255" text-anchor="middle" fill="#495057" font-size="24" font-weight="bold">客席エリア（Free Wi-Fi）</text>

            <g transform="translate(50, 50)">
                <rect width="190" height="130" class="shop-block" />
                <text x="15" y="35" class="shop-id">01</text>
                <text x="15" y="75" class="shop-label">肉厚バーガー 極</text>
            </g>

            <g transform="translate(250, 50)">
                <rect width="145" height="90" class="shop-block" />
                <text x="15" y="35" class="shop-id">02</text>
                <text x="15" y="70" class="shop-label">讃岐うどん</text>
            </g>

            <g transform="translate(405, 50)">
                <rect width="145" height="90" class="shop-block" />
                <text x="15" y="35" class="shop-id">03</text>
                <text x="15" y="70" class="shop-label">担々麺</text>
            </g>

            <g transform="translate(560, 50)">
                <rect width="190" height="130" class="shop-block" />
                <text x="15" y="35" class="shop-id">04</text>
                <text x="15" y="75" class="shop-label">オムライス</text>
            </g>

            <g transform="translate(50, 320)">
                <rect width="190" height="130" class="shop-block" />
                <text x="15" y="35" class="shop-id">05</text>
                <text x="15" y="75" class="shop-label">石窯ピッツァ</text>
            </g>

            <g transform="translate(560, 320)">
                <rect width="190" height="130" class="shop-block" />
                <text x="15" y="35" class="shop-id">06</text>
                <text x="15" y="75" class="shop-label">フルーツパフェ</text>
            </g>

            <rect x="250" y="360" width="145" height="40" rx="5" class="facility" />
            <text x="322" y="385" text-anchor="middle" class="facility-text">返却口</text>

            <rect x="405" y="360" width="145" height="40" rx="5" class="facility" />
            <text x="477" y="385" text-anchor="middle" class="facility-text">給水所</text>

            <rect x="710" y="190" width="40" height="120" rx="5" class="facility" />
            <text x="730" y="250" text-anchor="middle" class="facility-text" transform="rotate(90, 730, 250)">トイレ・授乳室</text>
        </svg>
    </div>
</div>

</body>
</html>
